baseURL = "https://robotdesign.net/"
locale = "en"
title = "Robotdesign.net"

# 주소 에러 방지용 보안관
canonifyURLs = true
uglyURLs = false

[module]
  [[module.imports]]
    path = "github.com/nunocoracao/blowfish/v2"

[params]
  mainSections = ["posts"]

[params.homepage]
  layout = "page" # 파란 배경(background)을 없애고 미니멀한 텍스트 레이아웃으로 변경
  showRecent = true

[params.list]
  showSummary = true # ★ 핵심: 제목 아래에 기사 본문 요약 텍스트를 노출
  showCards = false # 카드 형태가 아닌 깔끔한 텍스트 리스트 형태로 정렬
