{{ define "main" }}
<div style="max-width:760px; margin:0 auto; padding:48px 32px;">
  <p style="color:#9ca3af; font-size:1rem; margin-bottom:48px; letter-spacing:0.01em;">
    Global intelligence on robotics — for the people who build them.
  </p>
  {{ range (where .Site.RegularPages "Section" "posts") | first 10 }}
  <article style="border-bottom:1px solid #1f2937; padding-bottom:36px; margin-bottom:36px;">
    <p style="color:#6b7280; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:8px;">
      {{ .Date.Format "January 2, 2006" }}
    </p>
    <h2 style="font-size:1.2rem; font-weight:600; margin-bottom:12px;">
      <a href="{{ .Permalink }}" style="color:#f9fafb; text-decoration:none;">{{ .Title }}</a>
    </h2>
    <p style="color:#9ca3af; line-height:1.7; margin-bottom:12px;">
      {{ .Summary | truncate 180 }}
    </p>
    <a href="{{ .Permalink }}" style="color:#60a5fa; font-size:0.85rem;">Read more →</a>
  </article>
  {{ end }}
</div>
{{ end }}
