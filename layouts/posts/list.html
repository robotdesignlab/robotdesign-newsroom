{{ define "main" }}
<div class="rdn-wrap">

  <div style="margin-bottom:48px;">
    <p style="font-size:0.72rem; font-weight:700; text-transform:uppercase;
              letter-spacing:0.12em; color:var(--rdn-text-tertiary);">
      All Articles
    </p>
  </div>

  {{ range .Pages }}
  <article style="border-bottom:1px solid var(--rdn-border); padding-bottom:36px; margin-bottom:36px;">

    {{ with .Params.categories }}
    <p style="font-size:0.72rem; font-weight:700; text-transform:uppercase;
              letter-spacing:0.12em; color:var(--rdn-category); margin-bottom:12px;">{{ index . 0 }}</p>
    {{ else }}
    <p style="font-size:0.72rem; text-transform:uppercase; letter-spacing:0.1em;
              color:var(--rdn-text-tertiary); margin-bottom:12px;">{{ .Date.Format "January 2, 2006" }}</p>
    {{ end }}

    <h2 class="rdn-list-title">
      <a href="{{ .Permalink }}" style="color:var(--rdn-text-primary); text-decoration:none;"
        onmouseover="this.style.color='var(--rdn-accent)'" onmouseout="this.style.color='var(--rdn-text-primary)'">{{ .Title }}</a>
    </h2>

    <p class="rdn-summary">
      {{ .Summary | truncate 180 }}
    </p>

    {{ with .Params.image }}
    <figure style="margin:20px 0 0 0;">
      <img src="{{ . }}" alt="{{ $.Params.imageAlt | default $.Title }}"
        style="width:100%; border-radius:6px; aspect-ratio:16/9; object-fit:cover;">
    </figure>
    {{ end }}

    <div style="margin-top:16px;">
      <a href="{{ .Permalink }}" style="color:var(--rdn-accent); font-size:0.85rem; text-decoration:none;">Read more →</a>
    </div>
  </article>
  {{ end }}

</div>
{{ end }}
