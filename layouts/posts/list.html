{{ define "main" }}
<div style="max-width:760px; margin:0 auto; padding:48px 32px;">
  <div style="margin-bottom:48px;">
    <p style="font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:#6b7280;">
      All Articles
    </p>
  </div>
  {{ range .Pages }}
  <article style="border-bottom:1px solid #1f2937; padding-bottom:36px; margin-bottom:36px;">
    <p style="font-size:0.75rem; text-transform:uppercase; letter-spacing:0.08em; color:#6b7280; margin-bottom:8px;">
      {{ .Date.Format "January 2, 2006" }}
    </p>
    <h2 style="font-size:1.3rem; font-weight:700; margin-bottom:12px; line-height:1.3;">
      <a href="{{ .Permalink }}" style="color:#f9fafb; text-decoration:none;">{{ .Title }}</a>
    </h2>
    <p style="color:#9ca3af; line-height:1.7; margin-bottom:12px; font-size:0.95rem;">
      {{ .Summary | truncate 180 }}
    </p>
    <a href="{{ .Permalink }}" style="color:#60a5fa; font-size:0.85rem;">Read more →</a>
  </article>
  {{ end }}
</div>
{{ end }}
