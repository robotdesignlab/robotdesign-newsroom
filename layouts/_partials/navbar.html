{{- $page := . -}}

<div class="hextra-nav-container hx:sticky hx:top-0 hx:z-20 hx:w-full hx:bg-transparent hx:print:hidden"
  style="position:relative;">
  <div
    class="hextra-nav-container-blur hx:pointer-events-none hx:absolute hx:z-[-1] hx:h-full hx:w-full hx:bg-white hx:dark:bg-dark hx:shadow-[0_2px_4px_rgba(0,0,0,.02),0_1px_0_rgba(0,0,0,.06)] hx:dark:shadow-[0_-1px_0_rgba(255,255,255,.1)_inset]">
  </div>

  <nav class="hextra-max-navbar-width hx:mx-auto hx:flex hx:items-center hx:justify-between hx:gap-2 hx:h-16 hx:px-6">
    {{ partial "navbar-title.html" . }}

    <div id="rdn-desktop-menu" style="display:flex; align-items:center; gap:28px;">
      <a href="/categories/humanoid/"   style="font-size:14px; font-weight:500; color:var(--rdn-text-tertiary); text-decoration:none;">Humanoid</a>
      <a href="/categories/industrial/" style="font-size:14px; font-weight:500; color:var(--rdn-text-tertiary); text-decoration:none;">Industrial</a>
      <a href="/categories/research/"   style="font-size:14px; font-weight:500; color:var(--rdn-text-tertiary); text-decoration:none;">Research</a>
      <a href="/categories/mobility/"   style="font-size:14px; font-weight:500; color:var(--rdn-text-tertiary); text-decoration:none;">Mobility</a>
      <a href="/about/"                 style="font-size:14px; font-weight:500; color:var(--rdn-text-tertiary); text-decoration:none;">About</a>
      <button id="rdn-theme-toggle" onclick="toggleTheme()"
        style="background:none; border:none; cursor:pointer; padding:4px; color:var(--rdn-text-tertiary); display:flex; align-items:center;"
        aria-label="Toggle theme">
        <svg id="rdn-sun" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"
          style="display:none;">
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
        <svg id="rdn-moon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
          viewBox="0 0 24 24">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
      </button>
    </div>

    <button id="rdn-hamburger" type="button"
      style="display:none; background:none; border:none; cursor:pointer; padding:4px; color:var(--rdn-text-primary);"
      aria-label="Menu">
      <svg id="rdn-icon-open" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"
        viewBox="0 0 24 24">
        <line x1="3" y1="6" x2="21" y2="6" />
        <line x1="3" y1="12" x2="21" y2="12" />
        <line x1="3" y1="18" x2="21" y2="18" />
      </svg>
      <svg id="rdn-icon-close" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"
        viewBox="0 0 24 24" style="display:none;">
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
  </nav>

  <div id="rdn-mobile-menu"
    style="display:none; position:absolute; right:24px; top:64px; background:var(--rdn-bg-card); border:1px solid var(--rdn-border); border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,0.4); min-width:140px; z-index:100;">
    <a href="/categories/humanoid/"
      style="display:block; font-size:0.95rem; color:var(--rdn-text-primary); text-decoration:none; padding:12px 20px; border-bottom:1px solid var(--rdn-border);">Humanoid</a>
    <a href="/categories/industrial/"
      style="display:block; font-size:0.95rem; color:var(--rdn-text-primary); text-decoration:none; padding:12px 20px; border-bottom:1px solid var(--rdn-border);">Industrial</a>
    <a href="/categories/research/"
      style="display:block; font-size:0.95rem; color:var(--rdn-text-primary); text-decoration:none; padding:12px 20px; border-bottom:1px solid var(--rdn-border);">Research</a>
    <a href="/categories/mobility/"
      style="display:block; font-size:0.95rem; color:var(--rdn-text-primary); text-decoration:none; padding:12px 20px; border-bottom:1px solid var(--rdn-border);">Mobility</a>
    <a href="/about/"
      style="display:block; font-size:0.95rem; color:var(--rdn-text-primary); text-decoration:none; padding:12px 20px;">About</a>
  </div>
</div>

<style>
  @media (max-width: 768px) {
    #rdn-desktop-menu {
      display: none !important;
    }

    #rdn-hamburger {
      display: block !important;
    }
  }
</style>

<script>
  function applyDark() {
    document.documentElement.classList.add('dark');
    document.documentElement.style.backgroundColor = '#111827';
    document.body.style.backgroundColor = '#111827';
    var sun = document.getElementById('rdn-sun');
    var moon = document.getElementById('rdn-moon');
    if (sun) sun.style.display = 'block';
    if (moon) moon.style.display = 'none';
  }

  function applyLight() {
    document.documentElement.classList.remove('dark');
    document.documentElement.style.backgroundColor = '';
    document.body.style.backgroundColor = '';
    var sun = document.getElementById('rdn-sun');
    var moon = document.getElementById('rdn-moon');
    if (sun) sun.style.display = 'none';
    if (moon) moon.style.display = 'block';
  }

  function toggleTheme() {
    var isDark = document.documentElement.classList.contains('dark');
    if (isDark) {
      applyLight();
      localStorage.setItem('theme', 'light');
    } else {
      applyDark();
      localStorage.setItem('theme', 'dark');
    }
  }

  (function () {
    var saved = localStorage.getItem('theme');
    var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (saved === 'dark' || (!saved && prefersDark)) {
      applyDark();
    }
  })();

  (function () {
    var btn = document.getElementById('rdn-hamburger');
    var menu = document.getElementById('rdn-mobile-menu');
    var iconOpen = document.getElementById('rdn-icon-open');
    var iconClose = document.getElementById('rdn-icon-close');
    if (!btn) return;
    btn.addEventListener('click', function () {
      var isOpen = menu.style.display === 'block';
      menu.style.display = isOpen ? 'none' : 'block';
      iconOpen.style.display = isOpen ? 'block' : 'none';
      iconClose.style.display = isOpen ? 'none' : 'block';
    });
  })();
</script>
