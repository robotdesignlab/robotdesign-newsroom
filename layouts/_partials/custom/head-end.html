{{/* Gen2 self-host 웹폰트 — assets/fonts/ 를 발행하고 preload.
     hextra 가 실제로 호출하는 살아있는 훅은 custom/head-end.html (custom/head.html 아님). */}}
{{- range slice "fonts/archivo-var.woff2" "fonts/plexmono-500.woff2" "fonts/plexmono-600.woff2" -}}
  {{- with resources.Get . -}}
    <link rel="preload" href="{{ .RelPermalink }}" as="font" type="font/woff2" crossorigin>
  {{- end -}}
{{- end -}}
